# Cobaya config for Phase 3 SQMH joint MCMC
# STUB: Phase 2 CLASS 패치 완료 후 활성화
#
# Usage (after Phase 2 done):
#   cobaya-run sqmh_planck_desi.yaml -r 4

theory:
  # Phase 3: switch to sqmh_theory_wrapper.SQMHClassy once the CLASS-SQMH
  # Python wrapper (Phase 2 Step 4) exposes SQMH_* via classy.set().
  classy:
    path: ../class_patch/class_sqmh
    extra_args:
      # SQMH-specific parameters (injected via patched CLASS)
      SQMH_enabled: 1
      SQMH_V_family: RP    # canonical string: RP | mass | exp
      # SQMH_xi, SQMH_V_params sampled below
      N_ncdm: 1
      N_ur: 2.0328
      m_ncdm: 0.06
      T_ncdm: 0.71611

likelihood:
  # Planck 2018 TTTEEE + lensing (requires clik installed separately)
  planck_2018_highl_plik.TTTEEE:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  planck_2018_lensing.clik:

  # DESI DR2 BAO — Cobaya likelihood name is 'bao.desi_dr2' (arXiv:2503.14738).
  # If the installed Cobaya predates DR2 support, fall back to a custom
  # likelihood reading simulations/desi_dr2_bao.txt + covariance.
  bao.desi_dr2:

  # DESY5 SN (Pantheon+ also acceptable; DESY5 matches DESI joint papers).
  sn.desy5:

params:
  # --- Cosmological ---
  H0:
    prior: {min: 55, max: 80}
    ref: {dist: norm, loc: 67.36, scale: 1.0}
    proposal: 0.5
    latex: H_0

  omega_b:
    prior: {min: 0.019, max: 0.025}
    ref: {dist: norm, loc: 0.0224, scale: 0.0001}
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2

  omega_cdm:
    prior: {min: 0.08, max: 0.16}
    ref: {dist: norm, loc: 0.120, scale: 0.001}
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2

  A_s:
    prior: {min: 1.5e-9, max: 3e-9}
    ref: {dist: norm, loc: 2.1e-9, scale: 1e-11}
    proposal: 1e-11
    latex: A_\mathrm{s}

  n_s:
    prior: {min: 0.9, max: 1.0}
    ref: {dist: norm, loc: 0.9649, scale: 0.005}
    proposal: 0.002
    latex: n_\mathrm{s}

  tau_reio:
    # Planck 2018 Gaussian prior; keep min bound away from 0 to avoid pathologies.
    prior: {dist: norm, loc: 0.0544, scale: 0.0073}
    ref: {dist: norm, loc: 0.054, scale: 0.008}
    proposal: 0.003
    latex: \tau_\mathrm{reio}

  # --- SQMH ---
  # SQMH_xi >= 0 by construction: xi<0 maps to phantom w<-1, which violates
  # the SQMH metabolism sign (matter gains energy from phi). Phantom exclusion
  # is required for physical interpretation — see CLAUDE.md re-발방지 rules.
  SQMH_xi:
    prior: {min: 0.0, max: 1.0}
    ref: {dist: norm, loc: 0.35, scale: 0.1}
    proposal: 0.05
    latex: \xi_\mathrm{SQMH}

  SQMH_V_param_n:       # Ratra-Peebles slope
    prior: {min: 0.01, max: 5.0}
    ref: {dist: norm, loc: 0.35, scale: 0.1}
    proposal: 0.05
    latex: n_\mathrm{RP}

  # --- Derived ---
  sigma8:
    latex: \sigma_8
  omega_m:
    latex: \Omega_\mathrm{m}
  S8:
    latex: S_8
  w0_eff:
    latex: w_0^\mathrm{eff}
  wa_eff:
    latex: w_a^\mathrm{eff}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    max_tries: 1000
    learn_proposal: true
    oversample_power: 0.4

output: chains/sqmh_planck_desi_RP
